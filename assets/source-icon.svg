<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#E6F4FE"/>

  <!-- Sora mascot scaled to ~60% of canvas, centered -->
  <!-- Original viewBox 0 0 100 100, mascot spans roughly y=14 to y=92, x=20 to x=80 -->
  <!-- Scale factor: 1024 * 0.62 / 100 = 6.35, offset to center -->
  <g transform="translate(192, 173) scale(6.4)">
    <defs>
      <clipPath id="body-clip">
        <path d="M 50 14 C 63 36, 76 54, 76 66 A 26 26 0 0 1 24 66 C 24 54, 37 36, 50 14 Z"/>
      </clipPath>
    </defs>

    <path d="M 50 14 C 63 36, 76 54, 76 66 A 26 26 0 0 1 24 66 C 24 54, 37 36, 50 14 Z" fill="#5B9BC8"/>

    <g clip-path="url(#body-clip)">
      <path d="M 26 68 C 22 70, 20 76, 22 82 C 24 86, 28 85, 28 80 C 28 74, 27 70, 26 68 Z" fill="#2E6F8E" opacity="0.5" transform="translate(0.7 1.3)"/>
      <path d="M 74 68 C 78 70, 80 76, 78 82 C 76 86, 72 85, 72 80 C 72 74, 73 70, 74 68 Z" fill="#2E6F8E" opacity="0.5" transform="translate(0.7 1.3)"/>
    </g>

    <path d="M 26 68 C 22 70, 20 76, 22 82 C 24 86, 28 85, 28 80 C 28 74, 27 70, 26 68 Z" fill="#5B9BC8"/>
    <path d="M 74 68 C 78 70, 80 76, 78 82 C 76 86, 72 85, 72 80 C 72 74, 73 70, 74 68 Z" fill="#5B9BC8"/>

    <circle cx="40" cy="68" r="3.6" fill="#1A3A4A"/>
    <circle cx="60" cy="68" r="3.6" fill="#1A3A4A"/>
    <line x1="44" y1="68" x2="56" y2="68" stroke="#1A3A4A" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
